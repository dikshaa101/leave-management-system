services:
  db:
    image: postgres:17-alpine
    container_name: leave-management-db
    environment:
      POSTGRES_DB: leave_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Diksha@101
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d leave_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leave-management-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/leave_management
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Diksha@101
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      JWT_SECRET: ThisIsMyVerySecureSecretKeyForJwtAuthentication12345
      JWT_EXPIRATION: 604800000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: leave-management-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
